name: Codeless Acceptance Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Models API (Copilot) requires models: read
permissions:
  contents: read
  models: read

jobs:
  acceptance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── App ──────────────────────────────────────────────────────────────────
      - name: Install app dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app (preview server)
        run: npm run preview -- --port 5173 &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null && echo "App is up" && exit 0
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "App did not start in time" && exit 1

      # ── Test runner ───────────────────────────────────────────────────────────
      - name: Install test runner dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: .github/scripts

      - name: Run codeless acceptance tests
        run: node run-acceptance-tests.mjs
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_URL: http://localhost:5173

      # ── Artefacts ─────────────────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-results
          path: .github/scripts/test-results/
          retention-days: 14
